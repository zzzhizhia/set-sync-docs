name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # write: needed to force-move the floating major tag
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Publish to npm (CLI)
      - run: npx npm@latest publish --access public --provenance

      # Force-move the floating major tag (e.g. v2 → v2.1.3) so Action users
      # pinned to `@v2` pick up the release automatically.
      - name: Move floating major tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          MAJOR="${TAG%%.*}"   # v2.1.3 → v2
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$TAG"
          git push -f origin "$MAJOR"
